services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    env_file: ../.env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - chroma

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jobhunter
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  chroma:
    image: chromadb/chroma
    ports:
      - "8001:8000"
